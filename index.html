<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ World Cup Trivia Extravaganza! ⚽</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Celebration Confetti -->
    <div id="confetti-container"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <div class="home-content">
                <h1 class="title-main">⚽ WORLD CUP TRIVIA ⚽</h1>
                <p class="subtitle">Test Your Soccer Knowledge!</p>
                
                <div class="home-buttons">
                    <button class="btn btn-large btn-primary" onclick="startGame('classic')">
                        🎮 Classic Trivia
                    </button>
                    <button class="btn btn-large btn-secondary" onclick="startGame('speed')">
                        ⚡ Speed Round
                    </button>
                    <button class="btn btn-large btn-tertiary" onclick="startGame('legendary')">
                        👑 Legendary Challenge
                    </button>
                </div>

                <div class="leaderboard-preview">
                    <h3>🏆 Top Scorers</h3>
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="score-info">
                    <div class="score-box">
                        <span class="score-label">Score:</span>
                        <span class="score-value" id="score">0</span>
                    </div>
                    <div class="score-box">
                        <span class="score-label">Streak:</span>
                        <span class="score-value streak" id="streak">0</span>
                    </div>
                </div>
                <button class="btn btn-small btn-danger" onclick="quitGame()">← Quit</button>
            </div>

            <div class="game-content">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>

                <div class="question-container">
                    <h2 id="question-text" class="question">Question</h2>
                    <p class="question-info" id="question-info"></p>
                </div>

                <div class="answers-container" id="answers-container">
                    <!-- Answers will be injected here -->
                </div>

                <div class="timer" id="timer-container" style="display: none;">
                    <div class="timer-circle">
                        <svg class="timer-svg" viewBox="0 0 100 100">
                            <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="timer-circle-progress" cx="50" cy="50" r="45" id="timer-circle"></circle>
                        </svg>
                        <span id="timer-text">30</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="results-content">
                <h1 id="results-title">Game Over!</h1>
                <div class="results-stats">
                    <div class="stat-item">
                        <span class="stat-label">Final Score:</span>
                        <span class="stat-value" id="final-score">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Best Streak:</span>
                        <span class="stat-value" id="final-streak">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Correct Answers:</span>
                        <span class="stat-value" id="final-correct">0</span>
                    </div>
                </div>

                <div class="achievement-section" id="achievement-section"></div>

                <div class="results-buttons">
                    <button class="btn btn-large btn-primary" onclick="goHome()">
                        🏠 Home
                    </button>
                    <button class="btn btn-large btn-secondary" onclick="location.reload()">
                        🔄 Play Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
